# CareerPilot worker — runs on DO Droplet (Frankfurt 4GB)
#
# Services:
#   - browserless: persistent Chromium with CDP, drives HH login/scan/apply
#   - flowise:     AI-agent builder + RAG chatflow, exposed at flowise.<domain>
#   - caddy:       TLS reverse proxy for both services
#
# Setup: see setup.sh + .env.example
# Redeploy: docker compose up -d

services:
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: cp-browserless
    restart: unless-stopped
    environment:
      - TOKEN=${BROWSERLESS_TOKEN}
      - CONCURRENT=10
      - QUEUED=20
      - TIMEOUT=120000
      - DATA_DIR=/tmp/browserless
      - METRICS_JSON_PATH=/tmp/metrics.json
      - STEALTH=true
    volumes:
      - browserless_data:/tmp/browserless
    networks:
      - worker-net
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/pressure"]
      interval: 30s
      timeout: 5s
      retries: 3

  flowise:
    image: flowiseai/flowise:latest
    container_name: cp-flowise
    restart: unless-stopped
    environment:
      - PORT=3100
      - FLOWISE_USERNAME=${FLOWISE_USERNAME}
      - FLOWISE_PASSWORD=${FLOWISE_PASSWORD}
      - FLOWISE_SECRETKEY_OVERWRITE=${FLOWISE_SECRETKEY}
      - DATABASE_PATH=/root/.flowise
      - APIKEY_PATH=/root/.flowise
      - LOG_PATH=/root/.flowise/logs
      - DISABLE_FLOWISE_TELEMETRY=true
      - CORS_ORIGINS=*
      - IFRAME_ORIGINS=*
      # Claude credentials for chatflows
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - flowise_data:/root/.flowise
    networks:
      - worker-net
    expose:
      - "3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/api/v1/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: cp-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - WORKER_DOMAIN=${WORKER_DOMAIN}
      - FLOWISE_DOMAIN=${FLOWISE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - worker-net
    depends_on:
      - browserless
      - flowise

volumes:
  browserless_data:
  caddy_data:
  caddy_config:
  flowise_data:

networks:
  worker-net:
    driver: bridge
